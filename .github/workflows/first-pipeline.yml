name: CIBC Performance Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  performance-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Make SLA script executable
        run: chmod +x tests/check-sla.sh

      - name: Run SLA threshold check
        run: ./tests/check-sla.sh tests/results/sample.jtl

      - name: Notify team on success
        run: echo "✅ All performance checks passed — PR is safe to merge"