name: CIBC Performance Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  performance-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Simulate JMeter test results
        run: |
          echo "JMeter test completed"
          echo "1.6" > response_time.txt
          cat response_time.txt

      - name: Check SLA threshold
        run: |
          RESPONSE_TIME=$(cat response_time.txt)
          SLA_LIMIT=2.0
          echo "Response time: ${RESPONSE_TIME}s"
          echo "SLA limit: ${SLA_LIMIT}s"
          if (( $(echo "$RESPONSE_TIME > $SLA_LIMIT" | bc -l) )); then
            echo "❌ SLA BREACHED — pipeline failing"
            exit 1
          else
            echo "✅ SLA PASSED — response time within limit"
          fi

      - name: Notify team
        run: echo "All checks passed — PR is safe to merge"